{{ $file := .Get 0 }}
{{ $caption := .Get 1 }}

{{ $url := $file }}
{{ if hasPrefix $file "/" }}
    {{ $url = strings.TrimPrefix "/" $file }}
{{ end }}

<figure style="max-width: 100%; margin: 2rem auto; padding: 1rem; border: 1px solid #e5e7eb; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.06); background: #ffffff;">
    <!-- INCREASED WINDOW HEIGHT TO 750px TO SHOW MORE MAP -->
    <div style="width: 100%; height: 750px; overflow: hidden; position: relative;">
        <!-- INCREASED IFRAME HEIGHT TO 800px TO ACCOMMODATE THE CROP -->
        <iframe src="{{ $url | absURL }}" 
                style="width: 100%; height: 800px; border: none; position: absolute; top: -50px; left: 0;" 
                scrolling="yes">
        </iframe>
    </div>
    
    {{ if $caption }}
        <figcaption style="text-align: center; font-size: 0.9rem; color: #666; margin-top: 0.75rem; font-family: sans-serif;">
            {{ $caption }}
        </figcaption>
    {{ end }}
</figure>
