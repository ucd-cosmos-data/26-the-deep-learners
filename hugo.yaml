baseURL: https://ucd-cosmos-data.github.io/26-the-deep-learners/
locale: en-us
title: "The Deep Learners"
theme: ["PaperMod"]

params:
  defaultTheme: dark
  disableThemeToggle: true
  ShowToc: false
  assets:
    favicon: bonsai.jpeg #the small icon shown in the browser tab
  socialIcons:
    - name: github
      url: "https://github.com/ucd-cosmos-data/26-the-deep-learners"
  math: True
  profileMode:
    enabled: true
    title: "The Deep Learners"
    subtitle: "<Description>"
    imageUrl: "/26-the-deep-learners/bonsai.jpeg"
    imageWidth: 300
    imageHeight: 300

menu:
  main:
    - identifier: Members
      name: Members
      url: /members/
      weight: 10
    - identifier: Project
      name: Project
      url: /project/
      weight: 20
    - identifier: Logs
      name: Logs
      url: /logs/
      weight: 40
    - identifier: MiniProjects
      name: MiniProjects
      url: /miniprojects/
      weight: 30
    - identifier: course-site
      name: Course Website
      url: https://ucd-cosmos-data.github.io/

markup:
  goldmark:
    renderer:
      unsafe: true
    extensions:
      passthrough:
        delimiters:
          block:
          - - $$
            - $$
        enable: true